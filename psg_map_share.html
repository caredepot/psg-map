<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>수면검사 기관 지도 - 수도권</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; overflow: hidden; }
body { font-family: -apple-system, BlinkMacSystemFont, "맑은 고딕", "Malgun Gothic", "Apple SD Gothic Neo", sans-serif; }
button { font-family: inherit; }

/* 데스크탑 레이아웃 */
.layout { display: grid; grid-template-columns: 280px 1fr 340px; height: 100vh; }

.sidebar { background: #1F4E78; color: #fff; overflow-y: auto; -webkit-overflow-scrolling: touch; }
.sidebar h1 { font-size: 16px; padding: 16px; border-bottom: 1px solid rgba(255,255,255,0.15); display: flex; justify-content: space-between; align-items: center; }
.sidebar h1 small { display: block; font-size: 11px; opacity: 0.7; margin-top: 4px; font-weight: normal; }
.sidebar h1 .close-btn { display: none; background: none; border: none; color: #fff; font-size: 24px; cursor: pointer; padding: 0 4px; }
.search { padding: 10px 12px; border-bottom: 1px solid rgba(255,255,255,0.15); }
.search input { width: 100%; padding: 9px 12px; border: none; border-radius: 6px; font-size: 14px; }
.sido-section { padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.1); }
.sido-name { font-size: 13px; font-weight: 700; padding: 6px 16px; color: #B4D4F7; }
.sgg-item { padding: 10px 16px 10px 24px; cursor: pointer; font-size: 14px; display: flex; justify-content: space-between; align-items: center; }
.sgg-item:hover { background: rgba(255,255,255,0.1); }
.sgg-item.active { background: #2E75B6; }
.sgg-item .cnt { background: rgba(255,255,255,0.2); padding: 2px 8px; border-radius: 10px; font-size: 11px; }
.show-all { padding: 12px 16px; font-size: 14px; cursor: pointer; background: rgba(255,255,255,0.05); border-bottom: 1px solid rgba(255,255,255,0.15); }
.show-all:hover { background: rgba(255,255,255,0.15); }
#map { width: 100%; height: 100%; }

.detail { background: #f7f7f9; overflow-y: auto; -webkit-overflow-scrolling: touch; border-left: 1px solid #ddd; }
.detail-header { padding: 14px 16px; background: #2E75B6; color: #fff; position: sticky; top: 0; z-index: 10; display: flex; justify-content: space-between; align-items: flex-start; }
.detail-header h2 { font-size: 15px; }
.detail-header small { font-size: 11px; opacity: 0.8; display: block; margin-top: 3px; }
.detail-header .close-btn { display: none; background: none; border: none; color: #fff; font-size: 24px; cursor: pointer; padding: 0 4px; }
.hospital { padding: 14px 16px; border-bottom: 1px solid #e5e5e5; cursor: pointer; }
.hospital:active { background: #fff; }
.hospital .name { font-weight: 600; font-size: 14px; color: #1F4E78; margin-bottom: 4px; }
.hospital .meta { font-size: 12px; color: #666; margin-top: 3px; }
.hospital .kind { display: inline-block; padding: 2px 7px; background: #4472C4; color: #fff; border-radius: 3px; font-size: 11px; margin-left: 4px; }
.hospital .tel { color: #2E75B6; font-weight: 500; }

.popup { padding: 12px; max-width: 280px; }
.popup-name { font-weight: 700; font-size: 14px; margin-bottom: 8px; color: #1F4E78; padding-right: 16px; }
.popup-row { font-size: 12px; margin: 3px 0; line-height: 1.5; }
.popup-row b { color: #888; display: inline-block; min-width: 38px; }
.popup-link { color: #2E75B6; word-break: break-all; }

/* 모바일 토글 버튼 */
.mobile-bar { display: none; position: absolute; top: 8px; left: 8px; right: 8px; z-index: 1000; gap: 8px; }
.mobile-btn { flex: 1; padding: 12px; background: #fff; border: 1px solid #ddd; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.15); cursor: pointer; font-size: 13px; font-weight: 600; color: #1F4E78; }
.mobile-btn .badge { display: inline-block; background: #2E75B6; color: #fff; padding: 1px 7px; border-radius: 10px; font-size: 11px; margin-left: 4px; }

.backdrop { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 999; }
.backdrop.show { display: block; }

/* 모바일 레이아웃 */
@media (max-width: 768px) {
  .layout { grid-template-columns: 1fr; grid-template-rows: 1fr; position: relative; }
  .mobile-bar { display: flex; }
  
  .sidebar { 
    position: fixed; top: 0; left: 0; bottom: 0; width: 80%; max-width: 320px; 
    z-index: 1001; transform: translateX(-100%); transition: transform 0.25s ease-out; 
  }
  .sidebar.open { transform: translateX(0); }
  .sidebar h1 .close-btn { display: block; }
  
  .detail { 
    position: fixed; top: 0; right: 0; bottom: 0; width: 90%; max-width: 380px; 
    z-index: 1001; transform: translateX(100%); transition: transform 0.25s ease-out; 
    border-left: none; box-shadow: -4px 0 16px rgba(0,0,0,0.15);
  }
  .detail.open { transform: translateX(0); }
  .detail-header .close-btn { display: block; }
  
  #map { padding-top: 0; }
  
  .popup { max-width: 220px; }
  .popup-name { font-size: 13px; }
  .popup-row { font-size: 11px; }
  
  .hospital { padding: 12px 14px; }
  .hospital .name { font-size: 13px; }
  
  .sgg-item { padding: 12px 16px 12px 24px; }
  
  .error-box { padding: 20px !important; }
  .error-box h2 { font-size: 16px !important; }
  .error-box p { font-size: 13px !important; }
}

.error-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); color: #fff; z-index: 9999; padding: 20px; display: none; align-items: center; justify-content: center; }
.error-box { max-width: 600px; background: #fff; color: #333; padding: 30px; border-radius: 8px; }
.error-box h2 { color: #d32f2f; margin-bottom: 16px; }
.error-box p { line-height: 1.6; margin-bottom: 12px; font-size: 14px; }
.error-box code { background: #f0f0f0; padding: 2px 6px; border-radius: 3px; font-size: 12px; word-break: break-all; }
</style>
</head>

<div class="layout">

    <h1>

      <button class="close-btn" onclick="toggleSb()">×</button>
    </h1>
    <div class="search"><input type="text" id="search" placeholder="병원명/주소 검색..."></div>
    <div class="show-all" onclick="showAll()">전체 보기</div>
    <div id="sgg-list"></div>
  </div>
  <div id="map"></div>
  <div class="detail" id="dt-panel">
    <div class="detail-header">
      <div><h2 id="dt">전체 기관</h2><small id="dc"></small></div>
      <button class="close-btn" onclick="toggleDt()">×</button>
    </div>
    <div id="hl"></div>
  </div>
</div>

<div class="mobile-bar">
  <button class="mobile-btn" onclick="toggleSb()">≡ 지역 선택</button>
  <button class="mobile-btn" onclick="toggleDt()">목록 <span class="badge" id="mb-cnt">468</span></button>
</div>
<div class="backdrop" id="bd" onclick="closeAll()"></div>

</div>

const SO = ["서울특별시","인천광역시","경기도"];
const isMobile = () => window.innerWidth <= 768;

if (typeof kakao === 'undefined') {
  document.getElementById('loc').textContent = location.origin || 'file://';
  document.getElementById('err').style.display = 'flex';
} else {
  kakao.maps.load(initMap);
}

let map, cluster;
const ms = [];

function initMap() {
  map = new kakao.maps.Map(document.getElementById('map'), {
    center: new kakao.maps.LatLng(37.55, 127.0), level: isMobile() ? 10 : 9
  });
  cluster = new kakao.maps.MarkerClusterer({ map: map, averageCenter: true, minLevel: 6, gridSize: 60 });

  D.r.forEach((r, i) => {
    const m = new kakao.maps.Marker({ position: new kakao.maps.LatLng(r.lat, r.lng) });
    const iw = new kakao.maps.InfoWindow({
      content: `<div class="popup">
        <div class="popup-name">${r.n}</div>
        <div class="popup-row"><b>구분</b> ${r.k}</div>
        ${r.t ? `<div class="popup-row"><b>전화</b> <a href="tel:${r.t}" style="color:#2E75B6">${r.t}</a></div>` : ''}
        <div class="popup-row"><b>주소</b> ${r.a}</div>
        ${r.w ? `<div class="popup-row"><b>홈피</b> <a class="popup-link" href="${r.w.startsWith('http') ? r.w : 'http://' + r.w}" target="_blank">${r.w}</a></div>` : ''}
      </div>`, removable: true
    });
    kakao.maps.event.addListener(m, 'click', () => {
      ms.forEach(x => x.iw.close());
      iw.open(map, m);
    });
    cluster.addMarker(m);
    ms.push({ marker: m, iw, record: r, idx: i });
  });

  setupSidebar();
  render(null, null);
}

function setupSidebar() {
  const sgBy = {};
  SO.forEach(s => sgBy[s] = []);
  D.sg.forEach(s => sgBy[s.s].push(s));
  SO.forEach(s => sgBy[s].sort((a,b) => a.g.localeCompare(b.g, 'ko')));
  const sl = document.getElementById('sgg-list');
  SO.forEach(sido => {
    const total = sgBy[sido].reduce((a,b) => a + b.c, 0);
    const sec = document.createElement('div');
    sec.className = 'sido-section';
    sec.innerHTML = `<div class="sido-name">${sido} (${total})</div>`;
    sgBy[sido].forEach(s => {
      const it = document.createElement('div');
      it.className = 'sgg-item';
      it.innerHTML = `<span>${s.g}</span><span class="cnt">${s.c}</span>`;
      it.onclick = () => selectSgg(s);
      it.dataset.key = `${s.s} ${s.g}`;
      sec.appendChild(it);
    });
    sl.appendChild(sec);
  });
}

function clearActive() {
  document.querySelectorAll('.sgg-item.active').forEach(e => e.classList.remove('active'));
}

function selectSgg(s) {
  clearActive();
  document.querySelectorAll(`.sgg-item[data-key="${s.s} ${s.g}"]`).forEach(e => e.classList.add('active'));
  if (map) { map.setCenter(new kakao.maps.LatLng(s.lat, s.lng)); map.setLevel(5); }
  render(s.s, s.g);
  if (isMobile()) {
    closeAll();
    setTimeout(() => toggleDt(), 200);
  }
}

function showAll() {
  clearActive();
  if (map) { map.setCenter(new kakao.maps.LatLng(37.45, 127.0)); map.setLevel(isMobile() ? 10 : 9); }
  render(null, null);
  if (isMobile()) closeAll();
}

function render(sido, sigungu) {
  const list = document.getElementById('hl');
  let recs = (sido && sigungu) ? D.r.filter(r => r.s === sido && r.g === sigungu) : D.r;
  document.getElementById('dt').textContent = (sido && sigungu) ? `${sido} ${sigungu}` : '전체 기관';
  document.getElementById('dc').textContent = `${recs.length}개 기관`;
  document.getElementById('mb-cnt').textContent = recs.length;
  list.innerHTML = recs.map(r => {
    const idx = D.r.indexOf(r);
    return `<div class="hospital" onclick="focusM(${idx})">
      <div class="name">${r.n}<span class="kind">${r.k}</span></div>
      ${r.t ? `<div class="meta tel">${r.t}</div>` : ''}
      <div class="meta">${r.a}</div>
    </div>`;
  }).join('');
}

function focusM(i) {
  const target = ms.find(m => m.idx === i);
  if (!target || !map) return;
  map.setCenter(target.marker.getPosition());
  map.setLevel(3);
  ms.forEach(m => m.iw.close());
  target.iw.open(map, target.marker);
  if (isMobile()) closeAll();
}

function toggleSb() {
  const sb = document.getElementById('sb');
  const dt = document.getElementById('dt-panel');
  dt.classList.remove('open');
  sb.classList.toggle('open');
  document.getElementById('bd').classList.toggle('show', sb.classList.contains('open'));
}

function toggleDt() {
  const sb = document.getElementById('sb');
  const dt = document.getElementById('dt-panel');
  sb.classList.remove('open');
  dt.classList.toggle('open');
  document.getElementById('bd').classList.toggle('show', dt.classList.contains('open'));
}

function closeAll() {
  document.getElementById('sb').classList.remove('open');
  document.getElementById('dt-panel').classList.remove('open');
  document.getElementById('bd').classList.remove('show');
}

document.getElementById('search').addEventListener('input', e => {
  const q = e.target.value.toLowerCase().trim();
  if (!q) { render(null, null); return; }
  const recs = D.r.filter(r => r.n.toLowerCase().includes(q) || r.a.toLowerCase().includes(q));
  document.getElementById('dt').textContent = `검색: "${q}"`;
  document.getElementById('dc').textContent = `${recs.length}개 기관`;
  document.getElementById('mb-cnt').textContent = recs.length;
  document.getElementById('hl').innerHTML = recs.map(r => {
    const idx = D.r.indexOf(r);
    return `<div class="hospital" onclick="focusM(${idx})">
      <div class="name">${r.n}<span class="kind">${r.k}</span></div>
      ${r.t ? `<div class="meta tel">${r.t}</div>` : ''}
      <div class="meta">${r.a}</div>
    </div>`;
  }).join('');
});
</script>
</body>
</html>
